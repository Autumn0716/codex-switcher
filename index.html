<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Code Switcher — AI provider orchestration dashboard" />
    <title>Code Switcher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <style>
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; align-items: center; justify-content: center;
        background: #09090b;
        font-family: 'Outfit', ui-sans-serif, system-ui, sans-serif;
        color: #e4e4e7;
        transition: opacity 0.2s ease;
      }
      #splash.fade-out { opacity: 0; pointer-events: none; }
      #splash-inner { display: flex; flex-direction: column; align-items: center; gap: 16px; }
      #splash-logo {
        width: 40px; height: 40px; border-radius: 10px;
        background: linear-gradient(135deg, #e8913a 0%, #D97757 100%);
        animation: pulse-glow 1.8s ease-in-out infinite;
      }
      #splash-text { font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; color: #71717a; }
      @keyframes pulse-glow {
        0%, 100% { opacity: 0.7; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.05); }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div id="splash-inner">
        <div id="splash-logo"></div>
        <div id="splash-text">Loading</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
