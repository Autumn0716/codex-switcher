Overall: Codex在最新版本只支持ResponseAPI接口的模型;如有需要可以自行降级Codex为0.80.0版本(npm i -g @oepnai/codex@0.80.0),更新config.toml文件wire_api为chat;同时也请区分各厂商之间的Codingplan收费策略与Pay As You Go(PAYG);另,配置文件中openai(chat)表示该模型的chat/completions接口;openai(response)格式会直接写作codex;
Zai:
  descriptions: 只兼容Anthropic与Openai Completions接口
  baseurl:
    claude: https://api.z.ai/api/anthropic
    openai(chat): https://api.z.ai/api/paas/v4

Zai(coding plan):
  descriptions: 兼容Anthropic与Openai Completions与Responses接口
  baseurl:
    claude: https://api.z.ai/api/coding/anthropic
    openai(chat): https://api.z.ai/api/coding/paas/v4




